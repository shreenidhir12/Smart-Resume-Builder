<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Resume Builder</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-wrap">
        <header class="site-header">
            <div class="header-inner">
                <div class="logo">Resume<span>Builder</span></div>
                <p class="tagline">ATS-friendly resumes for top tech companies</p>
            </div>
        </header>

        <main class="main-content">
            <div class="form-card">
                <form id="resumeForm">

                    <section class="form-section">
                        <div class="section-label">01 — Personal Information</div>
                        <div class="form-grid two-col">
                            <div class="form-group">
                                <label>Full Name <span class="req">*</span></label>
                                <input type="text" id="fullName" placeholder="Enter your full name" required>
                            </div>
                            <div class="form-group">
                                <label>Email <span class="req">*</span></label>
                                <input type="email" id="email" placeholder="name@email.com" required>
                            </div>
                            <div class="form-group">
                                <label>Phone <span class="req">*</span></label>
                                <input type="tel" id="phone" placeholder="10-digit number" required>
                            </div>
                            <div class="form-group">
                                <label>Location</label>
                                <input type="text" id="address" placeholder="City, State">
                            </div>
                            <div class="form-group">
                                <label>LinkedIn URL</label>
                                <input type="url" id="linkedin" placeholder="linkedin.com/in/yourname">
                            </div>
                            <div class="form-group">
                                <label>GitHub URL</label>
                                <input type="url" id="github" placeholder="github.com/yourusername">
                            </div>
                        </div>
                    </section>

                    <section class="form-section">
    <div class="section-label">02 — Professional Summary</div>
    <div class="form-group">
        <label>Summary <span class="hint">(2 lines max)</span></label>
        <textarea id="summary" rows="3" placeholder="Write a brief professional summary about yourself..." required></textarea>
    </div>
    <button type="button" class="ai-btn" onclick="alert('AI enhancement feature coming soon!')">
    ✦ AI Enhancement (Coming Soon)
</button>
</section>
                        <div class="form-group">
                            <label>Summary <span class="hint">(2 lines max)</span></label>
                            <textarea id="summary" rows="3" placeholder="Final year B.Tech CS student with experience building web applications using HTML, CSS, and JavaScript."></textarea>
                        </div>
                    </section>

                    <section class="form-section">
                        <div class="section-label">03 — Skills</div>
                        <div class="form-grid two-col">
                            <div class="form-group">
                                <label>Languages <span class="hint">(comma separated)</span></label>
                                <input type="text" id="skillLanguages" placeholder="HTML, CSS, JavaScript, Python">
                            </div>
                            <div class="form-group">
                                <label>Frameworks / Libraries</label>
                                <input type="text" id="skillFrameworks" placeholder="React, Node.js, Bootstrap">
                            </div>
                            <div class="form-group">
                                <label>Tools</label>
                                <input type="text" id="skillTools" placeholder="Git, GitHub, VS Code, Figma">
                            </div>
                            <div class="form-group">
                                <label>Other Skills</label>
                                <input type="text" id="skillOther" placeholder="REST APIs, MySQL, Agile">
                            </div>
                        </div>
                        <button type="button" class="ai-btn" onclick="improveSection('skills')">
                        ✦ Improve Skills with AI
                    </button>
                    <div id="skills-ai-result" class="ai-result" style="display:none;">
                        <div class="ai-result-label">✦ AI Suggestion</div>
                        <div class="ai-result-text" id="skills-ai-text"></div>
                        <div class="ai-result-actions">
                            <button type="button" class="ai-use-btn" onclick="useAISuggestion('skills')">Use This</button>
                            <button type="button" class="ai-dismiss-btn" onclick="dismissAI('skills')">Dismiss</button>
                        </div>
                    </div>
                    </section>

                    <section class="form-section">
                        <div class="section-label">04 — Projects <span class="hint">(most important for freshers)</span></div>
                        <div id="projectsContainer">
                            <div class="dynamic-item project-item">
                                <div class="form-grid two-col">
                                    <div class="form-group">
                                        <label>Project Name</label>
                                        <input type="text" class="projectName" placeholder="Smart Resume Builder">
                                    </div>
                                    <div class="form-group">
                                        <label>Technologies Used</label>
                                        <input type="text" class="techStack" placeholder="HTML, CSS, JavaScript">
                                    </div>
                                    <div class="form-group">
                                        <label>GitHub Link</label>
                                        <input type="url" class="projectGithub" placeholder="github.com/you/project">
                                    </div>
                                    <div class="form-group">
                                        <label>Live Link</label>
                                        <input type="url" class="projectLive" placeholder="yourproject.github.io">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Description <span class="hint">"Built X using Y which resulted in Z"</span></label>
                                    <textarea class="projectDesc" rows="2" placeholder="Built a resume builder web app using HTML, CSS, JavaScript..."></textarea>
                                </div>
                                <button type="button" class="remove-btn" onclick="removeItem(this)">Remove</button>
                            </div>
                        </div>
                        <button type="button" class="add-btn" onclick="addProject()">+ Add Project</button>
                    </section>

                    <section class="form-section">
                        <div class="section-label">05 — Work Experience <span class="hint">(internships count!)</span></div>
                        <div id="experienceContainer">
                            <div class="dynamic-item experience-item">
                                <div class="form-grid two-col">
                                    <div class="form-group">
                                        <label>Job Title</label>
                                        <input type="text" class="jobTitle" placeholder="Software Developer Intern">
                                    </div>
                                    <div class="form-group">
                                        <label>Company</label>
                                        <input type="text" class="company" placeholder="Company Name">
                                    </div>
                                    <div class="form-group">
                                        <label>Start Date</label>
                                        <input type="month" class="startDate">
                                    </div>
                                    <div class="form-group">
                                        <label>End Date <span class="hint">(leave blank if current)</span></label>
                                        <input type="month" class="endDate">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Responsibilities <span class="hint">(one per line)</span></label>
                                    <textarea class="responsibilities" rows="3" placeholder="Built REST APIs using Node.js that reduced response time by 30%."></textarea>
                                </div>
                                <button type="button" class="remove-btn" onclick="removeItem(this)">Remove</button>
                            </div>
                        </div>
                        <button type="button" class="add-btn" onclick="addExperience()">+ Add Experience</button>
                    </section>

                    <section class="form-section">
                        <div class="section-label">06 — Education</div>
                        <div id="educationContainer">
                            <div class="dynamic-item education-item">
                                <div class="form-grid two-col">
                                    <div class="form-group">
                                        <label>Degree</label>
                                        <input type="text" class="degree" placeholder="B.Tech in Computer Science">
                                    </div>
                                    <div class="form-group">
                                        <label>Institution</label>
                                        <input type="text" class="institution" placeholder="University / College Name">
                                    </div>
                                    <div class="form-group">
                                        <label>Year of Passing</label>
                                        <input type="number" class="year" placeholder="2026">
                                    </div>
                                    <div class="form-group">
                                        <label>CGPA / Percentage</label>
                                        <input type="text" class="percentage" placeholder="8.5 CGPA">
                                    </div>
                                </div>
                                <button type="button" class="remove-btn" onclick="removeItem(this)">Remove</button>
                            </div>
                        </div>
                        <button type="button" class="add-btn" onclick="addEducation()">+ Add Education</button>
                    
                    </section>

                    <section class="form-section">
                        <div class="section-label">07 — Certifications <span class="hint">(optional)</span></div>
                        <div class="form-group">
                            <label>Certifications <span class="hint">(one per line)</span></label>
                            <textarea id="certifications" rows="3" placeholder="AWS Cloud Practitioner — Amazon, 2024&#10;Google UX Design Certificate — Coursera, 2024"></textarea>
                        </div>
                    </section>

                    <div class="form-actions">
                        <button type="submit" class="submit-btn">Generate Resume →</button>
                        <button type="button" class="reset-btn" onclick="resetForm()">Reset</button>
                    </div>

                </form>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
