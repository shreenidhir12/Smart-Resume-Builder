<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Preview</title>
    <link rel="stylesheet" href="preview-style.css">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="action-bar no-print">
        <div class="action-bar-inner">
            <span class="bar-logo">ResumeBuilder</span>
            <div class="bar-actions">
                <button onclick="goBack()" class="btn-outline">← Edit</button>
                <button onclick="window.print()" class="btn-primary">Print / Save as PDF</button>
                <button onclick="downloadHTML()" class="btn-outline">Download HTML</button>
            </div>
        </div>
    </div>

    <div class="resume-wrap">
        <div id="resumePreview" class="resume-page"></div>
    </div>

    <script src="preview-script.js"></script>
</body>
</html>
